<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Header Editor Pro - Free</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <!-- Profile Sidebar -->
    <div class="sidebar">
      <div id="profile-circles">
        <!-- Profile circles will be added here dynamically -->
      </div>
      <div class="add-profile-circle" id="add-profile" title="Add Profile">
        <i class="fas fa-plus"></i>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Toolbar -->
      <div class="toolbar">
        <div class="profile-info">
          <input
            class="profile-name-input"
            id="profile-name-input"
            type="text"
            value="Default"
          />
        </div>
        <div class="toolbar-actions">
          <button class="toolbar-btn" id="refresh-btn" title="Refresh">
            <i class="fas fa-sync-alt"></i>
          </button>
          <button class="toolbar-btn" id="pause-btn" title="Pause Extension">
            <i class="fas fa-pause"></i>
          </button>
          <button
            class="toolbar-btn"
            id="pin-btn"
            title="Pin (Disable auto-close)"
          >
            <i class="fas fa-thumbtack"></i>
          </button>
          <button class="toolbar-btn" id="color-picker-btn" title="Profile Color">
            <i class="fas fa-palette"></i>
          </button>
          <button class="toolbar-btn" id="fullscreen-btn" title="Fullscreen">
            <i class="fas fa-expand"></i>
          </button>
          <button class="toolbar-btn" id="menu-btn" title="Menu">
            <i class="fas fa-ellipsis-v"></i>
          </button>
        </div>
      </div>

      <!-- Dropdown Menu -->
      <div class="dropdown-menu" id="profile-dropdown" style="display: none">
        <div class="dropdown-item" id="import-item">
          <i class="fas fa-file-import"></i>
          <span>Import Configuration</span>
        </div>
        <div class="dropdown-item" id="export-item">
          <i class="fas fa-file-export"></i>
          <span>Export Configuration</span>
        </div>
        <div class="dropdown-item" id="delete-profile-item">
          <i class="fas fa-trash-alt"></i>
          <span>Delete Profile</span>
        </div>
      </div>

      <!-- Import/Export Modal -->
      <div class="modal-overlay" id="modal-overlay" style="display: none">
        <div class="modal">
          <div class="modal-header">
            <h3 class="modal-title" id="modal-title">Import Configuration</h3>
            <button class="modal-close" id="modal-close">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div class="modal-body">
            <!-- Export/Import Options -->
            <div class="modal-options" id="modal-options">
              <div class="option-group">
                <label class="option-label">Export scope:</label>
                <div class="radio-group">
                  <label class="radio-option">
                    <input
                      type="radio"
                      name="export-scope"
                      value="current"
                      checked
                    />
                    <span>Current profile only</span>
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="export-scope" value="all" />
                    <span>All profiles</span>
                  </label>
                </div>
              </div>

              <div class="option-group" id="import-options">
                <label class="option-label">Import mode:</label>
                <div class="radio-group">
                  <label class="radio-option">
                    <input
                      type="radio"
                      name="import-mode"
                      value="new"
                      checked
                    />
                    <span>Create new profile</span>
                  </label>
                  <label class="radio-option">
                    <input type="radio" name="import-mode" value="replace" />
                    <span>Replace current profile</span>
                  </label>
                </div>
              </div>
            </div>

            <div class="textarea-container">
              <textarea
                id="json-textarea"
                placeholder="Paste your JSON configuration here..."
                rows="10"
              ></textarea>
              <div class="validation-message" id="validation-message"></div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
            <button class="btn btn-primary" id="modal-action">Import</button>
            <button class="btn btn-copy" id="modal-copy" style="display: none">
              <i class="fas fa-copy"></i> Copy
            </button>
          </div>
        </div>
      </div>

      <!-- Color Picker Modal -->
      <div class="modal-overlay" id="color-picker-overlay" style="display: none">
        <div class="modal color-picker-modal">
          <div class="modal-header">
            <h3 class="modal-title">Profile Color</h3>
            <button class="modal-close" id="color-picker-close">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div class="modal-body">
            <div class="color-picker-content">
              <div class="color-preview-section">
                <span class="color-preview-label">Preview:</span>
                <div class="color-preview-circle" id="color-preview-circle">
                  <span id="color-preview-text">1</span>
                </div>
              </div>
              
              <div class="color-picker-tabs">
                <button class="color-tab active" id="background-tab">BACKGROUND</button>
                <button class="color-tab" id="text-tab">TEXT COLOR</button>
              </div>
              
              <div class="color-picker-area">
                <div class="color-gradient" id="color-gradient">
                  <div class="color-selector" id="color-selector"></div>
                </div>
                <div class="hue-slider-container">
                  <input type="range" class="hue-slider" id="hue-slider" min="0" max="360" value="180">
                </div>
              </div>
              
              <div class="preset-colors">
                <div class="preset-color" data-color="#ffffff" style="background: #ffffff;"></div>
                <div class="preset-color" data-color="#000000" style="background: #000000;"></div>
                <div class="preset-color" data-color="#4caf50" style="background: #4caf50;"></div>
                <div class="preset-color" data-color="#2196f3" style="background: #2196f3;"></div>
                <div class="preset-color" data-color="#ff9800" style="background: #ff9800;"></div>
                <div class="preset-color" data-color="#f44336" style="background: #f44336;"></div>
                <div class="preset-color" data-color="#9c27b0" style="background: #9c27b0;"></div>
                <div class="preset-color" data-color="#ffc107" style="background: #ffc107;"></div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" id="color-picker-cancel">Cancel</button>
            <button class="btn btn-primary" id="color-picker-save">Save</button>
          </div>
        </div>
      </div>

      <!-- Profile Description -->
      <div
        class="profile-description"
        id="profile-description"
        style="display: none"
      >
        <input
          class="description-input"
          id="description-input"
          type="text"
          placeholder="Click to add description..."
        />
      </div>

      <!-- Content -->
      <div class="content">
        <!-- Request Headers Section -->
        <div class="section" id="request-section">
          <div class="section-header">
            <span class="section-title">Request headers</span>
          </div>
          <div class="section-content">
            <div id="request-headers-list">
              <!-- Request headers will be added here -->
            </div>
            <button class="add-header-btn" id="add-request-header">
              <i class="fas fa-plus"></i> Add header
            </button>
          </div>
        </div>

        <!-- Response Headers Section -->
        <div class="section" id="response-section">
          <div class="section-header">
            <span class="section-title">Response headers</span>
          </div>
          <div class="section-content">
            <div id="response-headers-list">
              <!-- Response headers will be added here -->
            </div>
            <button class="add-header-btn" id="add-response-header">
              <i class="fas fa-plus"></i> Add header
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Hidden file input for import -->
    <input
      type="file"
      id="import-file-input"
      accept=".json"
      style="display: none"
    />

  </body>
</html>
