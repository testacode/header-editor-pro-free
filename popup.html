<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 600px;
      height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #ffffff;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar for profiles */
    .sidebar {
      width: 60px;
      background: #2d2d2d;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      overflow-y: auto;
      border-right: 1px solid #404040;
    }

    .profile-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #4a4a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 5px 0;
      cursor: pointer;
      position: relative;
      color: #ffffff;
      font-weight: bold;
      font-size: 16px;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .profile-circle.active {
      background: #4CAF50;
      border-color: #4CAF50;
    }

    .profile-circle:hover {
      background: #5a5a5a;
    }

    .profile-circle.active:hover {
      background: #45a049;
    }

    .profile-indicator {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid #2d2d2d;
    }

    .profile-indicator.active {
      background: #4CAF50;
    }

    .profile-indicator.inactive {
      background: #f44336;
    }

    .add-profile-circle {
      width: 40px;
      height: 40px;
      border: 2px dashed #666;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #666;
      font-size: 20px;
      margin: 5px 0;
      transition: all 0.2s;
    }

    .add-profile-circle:hover {
      border-color: #999;
      color: #999;
    }

    /* Main content area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Top toolbar */
    .toolbar {
      background: #2d2d2d;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #404040;
      min-height: 50px;
    }

    .profile-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .profile-name {
      font-size: 16px;
      font-weight: 500;
      color: #ffffff;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-btn {
      background: none;
      border: none;
      color: #ccc;
      padding: 6px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 16px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toolbar-btn:hover {
      background: #404040;
      color: #fff;
    }

    .toolbar-btn.active {
      color: #4CAF50;
    }

    .toolbar-btn.paused {
      color: #ff9800;
    }

    /* Content area */
    .content {
      flex: 1;
      overflow-y: auto;
      background: #1a1a1a;
    }

    .section {
      border-bottom: 1px solid #333;
    }

    .section-header {
      background: #2d2d2d;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      border-bottom: 1px solid #404040;
    }

    .section-title {
      font-style: italic;
      font-weight: 500;
      color: #ffffff;
    }

    .section-content {
      background: #1a1a1a;
    }

    /* Header items */
    .header-item {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid #2d2d2d;
      transition: background 0.1s;
    }

    .header-item:hover {
      background: #252525;
    }

    .header-checkbox {
      width: 16px;
      height: 16px;
      margin-right: 12px;
      cursor: pointer;
      accent-color: #4CAF50;
    }

    .header-name {
      min-width: 120px;
      max-width: 200px;
      background: none;
      border: none;
      color: #ffffff;
      font-size: 13px;
      padding: 4px 0;
      outline: none;
    }

    .header-name::placeholder {
      color: #666;
    }

    .header-value {
      flex: 1;
      background: none;
      border: none;
      color: #ffffff;
      font-size: 13px;
      padding: 4px 0;
      margin-left: 12px;
      outline: none;
    }

    .header-value::placeholder {
      color: #666;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 12px;
    }

    .header-delete {
      background: none;
      border: none;
      color: #f44336;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: 3px;
      transition: all 0.2s;
    }

    .header-delete:hover {
      background: rgba(244, 67, 54, 0.1);
    }

    .header-menu {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      border-radius: 3px;
      transition: all 0.2s;
    }

    .header-menu:hover {
      background: #333;
      color: #ccc;
    }

    .add-header-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: #4CAF50;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      width: 100%;
    }

    .add-header-btn:hover {
      background: rgba(76, 175, 80, 0.1);
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #2d2d2d;
    }

    ::-webkit-scrollbar-thumb {
      background: #666;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #777;
    }
  </style>
</head>
<body>
  <!-- Profile Sidebar -->
  <div class="sidebar">
    <div id="profile-circles">
      <!-- Profile circles will be added here dynamically -->
    </div>
    <div class="add-profile-circle" id="add-profile" title="Add Profile">+</div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="profile-info">
        <span class="profile-name" id="profile-name">Default</span>
      </div>
      <div class="toolbar-actions">
        <button class="toolbar-btn" id="refresh-btn" title="Refresh">↻</button>
        <button class="toolbar-btn" id="add-btn" title="Add Header">+</button>
        <button class="toolbar-btn" id="pause-btn" title="Pause Extension">⏸</button>
        <button class="toolbar-btn" id="export-btn" title="Export">↗</button>
        <button class="toolbar-btn" id="fullscreen-btn" title="Fullscreen">⛶</button>
        <button class="toolbar-btn" id="menu-btn" title="Menu">⋮</button>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Request Headers Section -->
      <div class="section" id="request-section">
        <div class="section-header">
          <span class="section-title">Request headers</span>
          <button class="toolbar-btn" id="request-menu">⋮</button>
        </div>
        <div class="section-content">
          <div id="request-headers-list">
            <!-- Request headers will be added here -->
          </div>
          <button class="add-header-btn" id="add-request-header">
            <span>+</span> Add header
          </button>
        </div>
      </div>

      <!-- Response Headers Section -->
      <div class="section" id="response-section">
        <div class="section-header">
          <span class="section-title">Response headers</span>
          <button class="toolbar-btn" id="response-menu">⋮</button>
        </div>
        <div class="section-content">
          <div id="response-headers-list">
            <!-- Response headers will be added here -->
          </div>
          <button class="add-header-btn" id="add-response-header">
            <span>+</span> Add header
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
