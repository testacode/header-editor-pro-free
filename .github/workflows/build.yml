name: Build Extension ZIP

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build and create extension ZIP
      run: |
        # Build extension using Rspack
        npm run build
        
        # Create ZIP from built extension
        cd dist
        zip -r ../header-editor-pro-free-extension.zip .
        cd ..
        
        # Show file size and contents
        ls -lh header-editor-pro-free-extension.zip
        echo "ZIP file contents:"
        unzip -l header-editor-pro-free-extension.zip
        
    - name: Upload ZIP as artifact
      uses: actions/upload-artifact@v4
      with:
        name: header-editor-pro-free-extension
        path: header-editor-pro-free-extension.zip
        retention-days: 30
        compression-level: 6  # Optimize compression