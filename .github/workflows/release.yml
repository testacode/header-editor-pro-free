name: Build and Release Extension

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # Allows manual trigger from GitHub UI
    inputs:
      publish_firefox:
        description: 'Publish to Firefox AMO after building'
        type: choice
        default: 'skip'
        options:
          - skip      # build + GitHub Release only (no store upload)
          - dry-run   # validate credentials and ZIPs without publishing
          - publish   # upload to AMO (goes straight to production)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating releases
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Get version from manifest
      id: get_version
      run: |
        VERSION=$(npm run get-version --silent)
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Extension version: $VERSION"

    - name: Build and package extension
      env:
        VERSION: ${{ steps.get_version.outputs.version }}
      run: |
        # Build extension for both browsers
        npm run build
        echo "Building version: $VERSION"

        # Create packages with version in filename
        npm run create-source-package
        
        # Create extension ZIP (works for both Chrome and Firefox)
        cd dist
        zip -r "../header-editor-pro-free-extension-v${VERSION}.zip" .
        cd ..
        
        # Verify ZIP contents
        echo "Extension package contents:"
        unzip -l "header-editor-pro-free-extension-v${VERSION}.zip"
        echo ""
        echo "Source package contents:"
        unzip -l "header-editor-pro-free-source-v${VERSION}.zip"
        
    - name: Create Release with GitHub CLI
      run: |
        # Create release notes
        cat > release_notes.md << 'EOF'
        ## 🚀 Header Editor Pro - Free v${{ steps.get_version.outputs.version }}
        
        ### 📦 Extension Packages
        **Universal Extension:** Download `header-editor-pro-free-extension-v${{ steps.get_version.outputs.version }}.zip` - works for both Chrome and Firefox
        **For Firefox AMO:** Also download `header-editor-pro-free-source-v${{ steps.get_version.outputs.version }}.zip` for reviewer submission
        
        **Installation Steps:**
        1. Download the ZIP file
        2. Extract it to a folder
        3. Open Chrome and go to `chrome://extensions`
        4. Enable "Developer mode" 
        5. Click "Load unpacked" and select the extracted folder
        
        ### 🔄 What's New
        - Check the commit history for detailed changes
        - All features remain completely free
        - No data collection or tracking
        
        ### 🌟 Features
        - ✅ Unlimited profiles
        - ✅ Real-time header modification  
        - ✅ Professional dark UI
        - ✅ Individual header controls
        - ✅ Privacy-focused (local storage only)
        
        **Support this project:** [Buy me a coffee](https://buymeacoffee.com/charlybrown) ☕
        EOF
        
        # Create release using GitHub CLI
        gh release create ${{ github.ref_name }} \
          --title "Header Editor Pro - Free v${{ steps.get_version.outputs.version }}" \
          --notes-file release_notes.md \
          "header-editor-pro-free-extension-v${{ steps.get_version.outputs.version }}.zip" \
          "header-editor-pro-free-source-v${{ steps.get_version.outputs.version }}.zip"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    # Firefox AMO auto-publish. Only runs on manual workflow_dispatch with
    # publish_firefox != skip, so a tag push never ships to production.
    # Chrome Web Store stays manual (dashboard upload) by design.
    - name: Publish to Firefox AMO
      if: github.event_name == 'workflow_dispatch' && inputs.publish_firefox != 'skip'
      env:
        FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
        FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
        FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
        VERSION: ${{ steps.get_version.outputs.version }}
        PUBLISH_MODE: ${{ inputs.publish_firefox }}
      run: |
        EXTRA_ARGS=()
        if [ "$PUBLISH_MODE" = "dry-run" ]; then
          EXTRA_ARGS+=(--dry-run)
          echo "Running in DRY-RUN mode: validating creds + ZIPs, not publishing."
        fi
        npx publish-browser-extension@4.0.5 \
          --firefox-zip "header-editor-pro-free-extension-v${VERSION}.zip" \
          --firefox-sources-zip "header-editor-pro-free-source-v${VERSION}.zip" \
          --firefox-extension-id "$FIREFOX_EXTENSION_ID" \
          --firefox-jwt-issuer "$FIREFOX_JWT_ISSUER" \
          --firefox-jwt-secret "$FIREFOX_JWT_SECRET" \
          "${EXTRA_ARGS[@]}"