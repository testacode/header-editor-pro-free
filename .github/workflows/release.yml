name: Build and Release Extension

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating releases
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build and package extension
      run: |
        # Build extension for both browsers
        npm run build
        
        # Create source package for Firefox AMO
        npm run create-source-package
        
        # Create extension ZIP (works for both Chrome and Firefox)
        cd dist
        zip -r ../extension.zip .
        cd ..
        
        # Verify ZIP contents
        echo "Extension contents:"
        unzip -l extension.zip
        
    - name: Get version from manifest
      id: get_version
      run: |
        VERSION=$(cat src/manifest.json | grep '"version"' | cut -d'"' -f4)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extension version: $VERSION"
        
    - name: Create Release with GitHub CLI
      run: |
        # Create release notes
        cat > release_notes.md << 'EOF'
        ## 🚀 Header Editor Pro - Free v${{ steps.get_version.outputs.version }}
        
        ### 📦 Extension Package
        **Universal Extension:** Download `extension.zip` - works for both Chrome and Firefox
        **For Firefox AMO:** Also download `source-code.zip` for reviewer submission
        
        **Installation Steps:**
        1. Download the ZIP file
        2. Extract it to a folder
        3. Open Chrome and go to `chrome://extensions`
        4. Enable "Developer mode" 
        5. Click "Load unpacked" and select the extracted folder
        
        ### 🔄 What's New
        - Check the commit history for detailed changes
        - All features remain completely free
        - No data collection or tracking
        
        ### 🌟 Features
        - ✅ Unlimited profiles
        - ✅ Real-time header modification  
        - ✅ Professional dark UI
        - ✅ Individual header controls
        - ✅ Privacy-focused (local storage only)
        
        **Support this project:** [Buy me a coffee](https://buymeacoffee.com/charlybrown) ☕
        EOF
        
        # Create release using GitHub CLI
        gh release create ${{ github.ref_name }} \
          --title "Header Editor Pro - Free v${{ steps.get_version.outputs.version }}" \
          --notes-file release_notes.md \
          extension.zip \
          source-code.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload to Chrome Web Store (Optional)
      if: false  # Set to true when you want to auto-publish to Chrome Web Store
      run: |
        echo "Auto-upload to Chrome Web Store can be configured here"
        echo "You would need to add Chrome Web Store API credentials"